<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 面试教练 - 登录与注册原型 V2</title>
  <style>
    :root {
      --bg-0: #f2f7fb;
      --bg-1: #eaf2ff;
      --bg-2: #ffeedd;
      --card: #ffffff;
      --ink: #16233d;
      --sub: #5a6a85;
      --line: #d7e2f2;
      --primary: #0f6d91;
      --primary-2: #15a37f;
      --accent: #e98e3a;
      --danger: #cb405a;
      --ok: #1f8a68;
      --radius-xl: 28px;
      --radius-lg: 16px;
      --shadow: 0 30px 70px rgba(15, 38, 70, 0.17);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 13% 15%, #d7e6ff 0, transparent 38%),
        radial-gradient(circle at 88% 80%, #ffe2c1 0, transparent 34%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 58%, var(--bg-2));
      overflow-x: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(8px);
      opacity: 0.52;
      pointer-events: none;
      z-index: 0;
      animation: floatY 6s ease-in-out infinite;
    }

    .orb.a {
      width: 240px;
      height: 240px;
      background: #9dc4ff;
      top: -60px;
      left: -60px;
    }

    .orb.b {
      width: 220px;
      height: 220px;
      background: #ffd0a4;
      right: -70px;
      bottom: 60px;
      animation-delay: 1.8s;
    }

    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    .page {
      min-height: 100vh;
      padding: 24px;
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
    }

    .shell {
      width: min(1120px, 100%);
      min-height: 700px;
      display: grid;
      grid-template-columns: 1.06fr 0.94fr;
      border-radius: var(--radius-xl);
      border: 1px solid #dbe6f5;
      overflow: hidden;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .left {
      padding: 44px 42px 36px;
      background:
        radial-gradient(circle at 18% 18%, rgba(40, 130, 198, 0.2) 0, transparent 38%),
        radial-gradient(circle at 78% 78%, rgba(30, 170, 133, 0.18) 0, transparent 36%),
        #f8fbff;
      border-right: 1px solid #e0ebf8;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 18px;
      animation: rise 0.7s ease;
    }

    .kicker {
      width: fit-content;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #166386;
      border: 1px solid #a9cbe3;
      border-radius: 999px;
      background: #e7f4fb;
      padding: 6px 12px;
    }

    .left h1 {
      margin: 0;
      font-size: 38px;
      line-height: 1.18;
      letter-spacing: 0.2px;
    }

    .left p {
      margin: 0;
      font-size: 15px;
      line-height: 1.75;
      color: #425876;
      max-width: 470px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      border: 1px solid #d7e4f3;
      background: #fff;
      border-radius: 14px;
      padding: 12px;
      transform: translateY(10px);
      opacity: 0;
      animation: rise 0.55s ease forwards;
    }

    .metric:nth-child(2) { animation-delay: 0.08s; }
    .metric:nth-child(3) { animation-delay: 0.16s; }

    .metric strong {
      display: block;
      font-size: 22px;
      color: #124f88;
    }

    .metric span {
      display: block;
      margin-top: 3px;
      color: var(--sub);
      font-size: 12px;
    }

    .jump-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .jump-links a {
      text-decoration: none;
      border: 1px solid #c7d7ea;
      border-radius: 999px;
      color: #25567a;
      background: #f5fbff;
      font-size: 13px;
      font-weight: 700;
      padding: 7px 12px;
    }

    .right {
      padding: 28px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
      animation: rise 0.7s ease;
    }

    .head h2 {
      margin: 0;
      font-size: 30px;
    }

    .head p {
      margin: 8px 0 0;
      color: var(--sub);
      font-size: 13px;
    }

    .tabs {
      padding: 6px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #f3f7fb;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tabs button {
      border: 0;
      border-radius: 10px;
      height: 38px;
      font-size: 14px;
      font-weight: 700;
      color: #4e617f;
      background: transparent;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tabs button.active {
      color: #fff;
      background: linear-gradient(120deg, var(--primary), var(--primary-2));
      box-shadow: 0 8px 18px rgba(17, 106, 143, 0.29);
    }

    .form-box {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: #fff;
      padding: 16px;
      min-height: 0;
      overflow: auto;
    }

    form {
      display: none;
      gap: 11px;
      align-content: start;
    }

    form.active { display: grid; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      font-size: 12px;
      font-weight: 700;
      color: #3d5370;
    }

    .field input {
      height: 42px;
      border: 1px solid #c8d8eb;
      border-radius: 10px;
      font-size: 14px;
      padding: 0 11px;
      color: #17304d;
      background: #fbfdff;
      outline: none;
      transition: 0.18s ease;
    }

    .field input:focus {
      border-color: #56a7cb;
      box-shadow: 0 0 0 3px rgba(57, 154, 198, 0.16);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--sub);
    }

    .meta a {
      color: #226b95;
      text-decoration: none;
      font-weight: 700;
    }

    .meta a:hover { text-decoration: underline; }

    .agree {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.5;
    }

    .agree input {
      margin-top: 2px;
      accent-color: #188868;
    }

    .action {
      border: 0;
      border-radius: 12px;
      height: 44px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      background: linear-gradient(120deg, #0f7296, #169976);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .action:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(18, 126, 141, 0.25);
    }

    .hint {
      margin-top: 3px;
      min-height: 18px;
      font-size: 12px;
      color: var(--danger);
    }

    .toast {
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      display: none;
      animation: rise 0.32s ease;
    }

    .toast.show { display: block; }

    .toast.ok {
      border: 1px solid #9dd7bd;
      background: #effcf5;
      color: var(--ok);
    }

    .toast.error {
      border: 1px solid #f0b1be;
      background: #fff3f6;
      color: var(--danger);
    }

    .foot-note {
      margin-top: 4px;
      font-size: 12px;
      color: #6a7892;
      text-align: center;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .left {
        border-right: 0;
        border-bottom: 1px solid #e0ebf8;
      }

      .metrics { grid-template-columns: 1fr 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .page { padding: 12px; }

      .left,
      .right { padding: 20px 16px; }

      .left h1 { font-size: 30px; }

      .row,
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>

  <main class="page">
    <section class="shell">
      <aside class="left">
        <span class="kicker">A05 · 赛题演示入口</span>
        <h1>先完成账号登录，再进入岗位化 AI 面试训练</h1>
        <p>
          本页用于展示登录注册流程。改版重点：信息层级更清晰、移动端可用性更好、视觉与面试主页面保持统一，便于比赛演示时一键切换。
        </p>
        <div class="metrics">
          <article class="metric">
            <strong>2</strong>
            <span>身份入口（登录/注册）</span>
          </article>
          <article class="metric">
            <strong>30s</strong>
            <span>平均注册耗时目标</span>
          </article>
          <article class="metric">
            <strong>100%</strong>
            <span>移动端单手操作可达</span>
          </article>
        </div>
        <div></div>
        <nav class="jump-links">
          <a href="./ui-prototype.html">进入面试主界面</a>
          <a href="./report-prototype.html">查看报告原型</a>
        </nav>
      </aside>

      <section class="right">
        <header class="head">
          <h2>欢迎回来</h2>
          <p>使用手机号/邮箱完成注册后，即可开始模拟面试。</p>
        </header>

        <div class="tabs">
          <button id="tabLogin" class="active" type="button">登录</button>
          <button id="tabRegister" type="button">注册</button>
        </div>

        <div class="form-box">
          <form id="loginForm" class="active">
            <div class="field">
              <label for="loginAccount">账号（用户名 / 手机 / 邮箱）</label>
              <input id="loginAccount" placeholder="请输入账号" />
            </div>
            <div class="field">
              <label for="loginPassword">密码</label>
              <input id="loginPassword" type="password" placeholder="请输入密码" />
            </div>
            <div class="meta">
              <label><input type="checkbox" id="rememberMe" /> 7天免登录</label>
              <a href="#" onclick="return false;">忘记密码</a>
            </div>
            <button class="action" type="submit">登录并进入系统</button>
            <p class="hint" id="loginHint"></p>
            <div class="toast" id="loginToast"></div>
          </form>

          <form id="registerForm">
            <div class="row">
              <div class="field">
                <label for="regUsername">用户名</label>
                <input id="regUsername" placeholder="例如：alice" />
              </div>
              <div class="field">
                <label for="regPhone">手机号</label>
                <input id="regPhone" placeholder="11位手机号" />
              </div>
            </div>
            <div class="field">
              <label for="regEmail">邮箱</label>
              <input id="regEmail" placeholder="name@example.com" />
            </div>
            <div class="row">
              <div class="field">
                <label for="regPwd">密码</label>
                <input id="regPwd" type="password" placeholder="至少8位" />
              </div>
              <div class="field">
                <label for="regPwd2">确认密码</label>
                <input id="regPwd2" type="password" placeholder="再次输入密码" />
              </div>
            </div>
            <label class="agree">
              <input type="checkbox" id="regAgree" />
              <span>我已阅读并同意《用户协议》《隐私政策》，并授权平台保存本次训练数据用于能力评估。</span>
            </label>
            <button class="action" type="submit">创建账号</button>
            <p class="hint" id="regHint"></p>
            <div class="toast" id="registerToast"></div>
          </form>
        </div>

        <p class="foot-note">提示：原型版仅演示交互，不会真正写入数据库。</p>
      </section>
    </section>
  </main>

  <script>
    const tabLogin = document.getElementById("tabLogin");
    const tabRegister = document.getElementById("tabRegister");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    const loginHint = document.getElementById("loginHint");
    const regHint = document.getElementById("regHint");
    const loginToast = document.getElementById("loginToast");
    const registerToast = document.getElementById("registerToast");

    function switchTab(type) {
      const isLogin = type === "login";
      tabLogin.classList.toggle("active", isLogin);
      tabRegister.classList.toggle("active", !isLogin);
      loginForm.classList.toggle("active", isLogin);
      registerForm.classList.toggle("active", !isLogin);
      loginHint.textContent = "";
      regHint.textContent = "";
      hideToast(loginToast);
      hideToast(registerToast);
    }

    function showToast(el, type, text) {
      el.className = `toast show ${type}`;
      el.textContent = text;
      setTimeout(() => hideToast(el), 2200);
    }

    function hideToast(el) {
      el.className = "toast";
      el.textContent = "";
    }

    tabLogin.addEventListener("click", () => switchTab("login"));
    tabRegister.addEventListener("click", () => switchTab("register"));

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const account = document.getElementById("loginAccount").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!account || !password) {
        loginHint.textContent = "请先填写账号和密码。";
        return;
      }

      loginHint.textContent = "";
      showToast(loginToast, "ok", "登录校验通过（原型），可跳转面试主页。",);
    });

    registerForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const username = document.getElementById("regUsername").value.trim();
      const phone = document.getElementById("regPhone").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const pwd = document.getElementById("regPwd").value;
      const pwd2 = document.getElementById("regPwd2").value;
      const agree = document.getElementById("regAgree").checked;

      if (!username || !phone || !email || !pwd || !pwd2) {
        regHint.textContent = "请完整填写注册信息。";
        return;
      }

      if (!/^1[3-9]\d{9}$/.test(phone)) {
        regHint.textContent = "手机号格式不正确。";
        return;
      }

      if (!/^\S+@\S+\.\S+$/.test(email)) {
        regHint.textContent = "邮箱格式不正确。";
        return;
      }

      if (pwd.length < 8) {
        regHint.textContent = "密码至少8位。";
        return;
      }

      if (pwd !== pwd2) {
        regHint.textContent = "两次输入的密码不一致。";
        return;
      }

      if (!agree) {
        regHint.textContent = "请先勾选用户协议与隐私政策。";
        return;
      }

      regHint.textContent = "";
      showToast(registerToast, "ok", "注册成功（原型），请切换到登录页。");
    });
  </script>
</body>
</html>
