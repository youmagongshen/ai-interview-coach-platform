<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 面试助手 - 面试主页</title>
  <link rel="stylesheet" href="./assets/css/interview-home.css?v=42" />
</head>
<body>
  <main class="app" id="app">
    <aside class="sidebar panel">
      <div class="brand">
        <h1 class="title-center">AI 面试助手</h1>
      </div>

      <button class="btn-new" id="newSessionBtn" type="button">+ 新建面试会话</button>
      <input class="search" id="searchInput" placeholder="搜索会话标题..." />

      <div class="session-list" id="sessionList"></div>

      <div class="user">
        <div class="avatar" id="avatar">U</div>
        <div class="user-meta">
          <strong id="userName">未登录</strong>
          <span id="userRole">请先登录后进入面试</span>
        </div>
        <button class="logout" type="button" id="logoutBtn">退出</button>
      </div>
    </aside>

    <section class="main panel">
      <header class="top">
        <div>
          <h2 id="title">请选择或新建会话</h2>
          <p id="subtitle">点击"开始面试"进入正式问答，结束后可查看报告。</p>
        </div>
        <div class="chips">
          <span class="chip" id="timerChip">倒计时 25:00</span>
          <button class="chip-btn" type="button" id="openReportBtn">查看报告</button>
        </div>
      </header>

      <section class="chat" id="chat">
      </section>

      <footer class="composer">
        <div class="input-wrapper">
          <textarea class="answer-area" id="answerInput" placeholder="输入你的回答，按 Enter 发送..."></textarea>
          <button class="voice-btn" type="button" id="voiceBtn" title="语音输入">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </button>
          <button class="send-btn" type="button" id="sendBtn" style="display:none;" title="发送">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>

        <div class="controls-row">
          <select id="roleSelect" class="select-btn">
            <option value="1">后端岗位</option>
            <option value="2">前端岗位</option>
          </select>

          <select id="modeSelect" class="select-btn">
            <option value="TEXT">文字面试</option>
            <option value="VIDEO">视频面试</option>
            <option value="VOICE">语音面试</option>
          </select>

          <label class="upload" for="resumeFile" id="resumeLabel" style="display:none;">上传简历</label>
          <input id="resumeFile" type="file" accept="pdf,.doc,.docx" />

          <button class="btn-start" type="button" id="startBtn">开始面试</button>
          <button class="btn-end" type="button" id="endBtn" style="display:none;">结束面试</button>
        </div>

        <div class="composer-tip" id="composerTip"></div>
      </footer>
    </section>
  </main>

  <aside class="drawer" id="reportDrawer">
    <header class="drawer-head">
      <h3>面试评估报告</h3>
      <button class="close" id="closeDrawer" type="button">关闭</button>
    </header>
    <div class="drawer-body">
      <section class="block">
        <h4>总分</h4>
        <div class="score">
          <strong id="totalScore">0</strong>
          <div style="flex:1">
            <div class="hint" id="reportSummary">暂无报告</div>
            <div class="bar"><i id="totalBar"></i></div>
          </div>
        </div>
      </section>

      <section class="block">
        <h4>维度细分</h4>
        <div class="hint">正确性</div>
        <div class="bar"><i id="barCorrectness"></i></div>
        <div class="hint">深度</div>
        <div class="bar"><i id="barDepth"></i></div>
        <div class="hint">逻辑</div>
        <div class="bar"><i id="barLogic"></i></div>
        <div class="hint">匹配度</div>
        <div class="bar"><i id="barMatch"></i></div>
        <div class="hint">表达</div>
        <div class="bar"><i id="barExpression"></i></div>
      </section>

      <section class="block">
        <h4>亮点与建议</h4>
        <div class="hint" id="reportHighlights"></div>
        <div class="hint" id="reportImprovements"></div>
      </section>
    </div>
  </aside>

  <!-- 语音通话弹窗 -->
  <div class="voice-call-modal" id="voiceCallModal">
    <div class="voice-call-card">
      <div class="call-header">
        <div class="ai-avatar" id="callAvatar">AI</div>
        <div class="call-status" id="callStatus">等待接听...</div>
      </div>
      
      <div class="call-content" id="callContent">
        <div class="call-text" id="callText">点击开始与AI面试官通话</div>
      </div>
      
      <div class="wave-animation" id="waveAnimation" style="display:none;">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      
      <div class="call-controls">
        <button class="call-btn hangup" id="hangupBtn" title="挂断">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
          </svg>
        </button>
        <button class="call-btn start-call" id="startCallBtn" title="开始通话">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>
          </svg>
        </button>
        <button class="call-btn mute" id="muteBtn" title="麦克风">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 视频通话弹窗 -->
  <div class="video-call-modal" id="videoCallModal">
    <div class="video-call-card">
      <div class="video-header">
        <div class="video-ai-avatar" id="videoCallAvatar">AI</div>
        <div class="video-call-status" id="videoCallStatus">等待接听...</div>
      </div>
      
      <!-- 视频区域 -->
      <div class="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-placeholder" id="videoPlaceholder">
          <span>点击开始开启摄像头</span>
        </div>
      </div>
      
      <div class="video-call-content" id="videoCallContent">
        <div class="video-call-text" id="videoCallText">点击开始与AI面试官视频通话</div>
      </div>
      
      <div class="video-wave-animation" id="videoWaveAnimation" style="display:none;">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      
      <div class="video-call-controls">
        <button class="video-call-btn hangup" id="videoHangupBtn" title="挂断">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
          </svg>
        </button>
        <button class="video-call-btn start-call" id="videoStartCallBtn" title="开始通话">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
        </button>
        <button class="video-call-btn mute" id="videoMuteBtn" title="麦克风">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
          </svg>
        </button>
        <button class="video-call-btn camera" id="videoCameraBtn" title="摄像头">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="./assets/js/interview-home.js?v=44"></script>
</body>
</html>
