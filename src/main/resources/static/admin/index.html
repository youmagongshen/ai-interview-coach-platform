<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Interview Admin | 管理端首页</title>
  <link rel="stylesheet" href="./vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="./vendor/adminlte/adminlte.min.css" />
  <link rel="stylesheet" href="./assets/css/admin-custom.css" />
</head>
<body class="hold-transition sidebar-mini layout-fixed layout-navbar-fixed text-sm">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li>
      <li class="nav-item d-none d-sm-inline-block"><a href="./index.html" class="nav-link">管理端首页</a></li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <button class="btn btn-outline-secondary btn-sm" onclick="location.reload()"><i class="fas fa-redo"></i> 重置演示数据</button>
      </li>
      <li class="nav-item">
        <div class="dropdown">
          <a href="#" class="nav-link dropdown-toggle" data-toggle="dropdown">
            <img src="https://ui-avatars.com/api/?name=Admin&background=0f7196&color=fff&size=32&rounded=true" alt="Admin" class="user-avatar" />
            <span class="d-none d-sm-inline">管理员</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-lg dropdown-menu-right">
            <li class="user-header bg-light p-2">
              <div class="d-flex align-items-center">
                <img src="https://ui-avatars.com/api/?name=Admin&background=0f7196&color=fff&size=64&rounded=true" alt="Admin" class="img-circle elevation-2" />
                <div class="ml-2">
                  <p class="m-0 font-weight-bold">管理员</p>
                  <p class="mb-0 text-xs text-muted">admin@example.com</p>
                </div>
              </div>
            </li>
            <li class="user-footer p-2">
              <button class="btn btn-danger btn-sm btn-block" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt mr-1"></i> 退出登录
              </button>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="./index.html" class="brand-link">
      <span class="brand-text font-weight-light ml-2">AI Interview Admin</span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          <li class="nav-item"><a href="./index.html" data-menu="index.html" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>仪表盘</p></a></li>
          <li class="nav-item"><a href="./roles.html" data-menu="roles.html" class="nav-link"><i class="nav-icon fas fa-balance-scale"></i><p>岗位与权重</p></a></li>
          <li class="nav-item"><a href="./questions.html" data-menu="questions.html" class="nav-link"><i class="nav-icon fas fa-list"></i><p>题库管理</p></a></li>
          <li class="nav-item"><a href="./knowledge.html" data-menu="knowledge.html" class="nav-link"><i class="nav-icon fas fa-book"></i><p>知识库管理</p></a></li>
          <li class="nav-item"><a href="./reports.html" data-menu="reports.html" class="nav-link"><i class="nav-icon fas fa-file-alt"></i><p>会话与报告</p></a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6"><h1>管理端首页</h1></div>
          
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="row">
          <div class="col-lg-3 col-6">
            <div class="small-box bg-info">
              <div class="inner"><h3 id="kpiRoles">0</h3><p>岗位总数</p></div>
              <div class="icon"><i class="fas fa-user-tie"></i></div>
            </div>
          </div>
          <div class="col-lg-3 col-6">
            <div class="small-box bg-success">
              <div class="inner"><h3 id="kpiQuestions">0</h3><p>题目总数</p></div>
              <div class="icon"><i class="fas fa-question-circle"></i></div>
            </div>
          </div>
          <div class="col-lg-3 col-6">
            <div class="small-box bg-warning">
              <div class="inner"><h3 id="kpiSessions">0</h3><p>会话总数</p></div>
              <div class="icon"><i class="fas fa-comments"></i></div>
            </div>
          </div>
          <div class="col-lg-3 col-6">
            <div class="small-box bg-danger">
              <div class="inner"><h3 id="kpiAvgScore">0</h3><p>平均得分</p></div>
              <div class="icon"><i class="fas fa-chart-line"></i></div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-lg-8">
            <div class="card card-outline card-primary">
              <div class="card-header"><h3 class="card-title">最近会话得分趋势</h3></div>
              <div class="card-body"><canvas id="scoreTrend" height="120"></canvas></div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card card-outline card-success">
              <div class="card-header"><h3 class="card-title">数据概览</h3></div>
              <div class="card-body" id="overviewBox"></div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-lg-12">
            <div class="card">
              <div class="card-header"><h3 class="card-title">最新会话记录</h3></div>
              <div class="card-body table-responsive p-0">
                <table class="table table-hover text-nowrap mb-0">
                  <thead>
                    <tr>
                      <th>会话ID</th>
                      <th>用户ID</th>
                      <th>岗位</th>
                      <th>会话状态</th>
                      <th>评估状态</th>
                      <th>得分</th>
                      <th>创建时间</th>
                    </tr>
                  </thead>
                  <tbody id="sessionTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<script src="./vendor/jquery/jquery.min.js"></script>
<script src="./vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="./vendor/adminlte/adminlte.min.js"></script>
<script src="./vendor/chartjs/chart.umd.min.js"></script>
<script src="./assets/js/admin-api.js"></script>
<script src="./assets/js/admin-common.js"></script>
<script src="./assets/js/dashboard.js"></script>
</body>
</html>
