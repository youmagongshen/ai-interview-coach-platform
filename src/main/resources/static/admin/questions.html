<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Interview Admin | 题库管理</title>
  <link rel="stylesheet" href="./vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="./vendor/adminlte/adminlte.min.css" />
  <link rel="stylesheet" href="./assets/css/admin-custom.css" />
</head>
<body class="hold-transition sidebar-mini layout-fixed layout-navbar-fixed text-sm">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li></ul>
    <ul class="navbar-nav ml-auto"><li class="nav-item"><a href="./index.html" class="nav-link text-muted">返回仪表盘</a></li></ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="./index.html" class="brand-link"><span class="brand-text font-weight-light ml-2">AI Interview Admin</span></a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          <li class="nav-item"><a href="./index.html" data-menu="index.html" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>仪表盘</p></a></li>
          <li class="nav-item"><a href="./roles.html" data-menu="roles.html" class="nav-link"><i class="nav-icon fas fa-balance-scale"></i><p>岗位与权重</p></a></li>
          <li class="nav-item"><a href="./questions.html" data-menu="questions.html" class="nav-link"><i class="nav-icon fas fa-list"></i><p>题库管理</p></a></li>
          <li class="nav-item"><a href="./knowledge.html" data-menu="knowledge.html" class="nav-link"><i class="nav-icon fas fa-book"></i><p>知识库管理</p></a></li>
          <li class="nav-item"><a href="./reports.html" data-menu="reports.html" class="nav-link"><i class="nav-icon fas fa-file-alt"></i><p>会话与报告</p></a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-7"><h1>题库管理</h1></div>
          <div class="col-sm-5 text-right"><button class="btn btn-primary btn-sm" id="addBtn"><i class="fas fa-plus"></i> 新增题目</button></div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="card card-outline card-info">
          <div class="card-header"><h3 class="card-title">筛选条件</h3></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group col-md-3"><label>岗位</label><select id="fRole" class="form-control"></select></div>
              <div class="form-group col-md-2"><label>题目类型</label><select id="fType" class="form-control"><option value="">全部</option><option>TECH</option><option>PROJECT</option><option>SCENARIO</option><option>BEHAVIOR</option></select></div>
              <div class="form-group col-md-2"><label>难度</label><select id="fDifficulty" class="form-control"><option value="">全部</option><option>JUNIOR</option><option>MIDDLE</option><option>SENIOR</option></select></div>
              <div class="form-group col-md-2"><label>启用状态</label><select id="fActive" class="form-control"><option value="">全部</option><option value="1">已启用</option><option value="0">已禁用</option></select></div>
              <div class="form-group col-md-3"><label>关键词</label><input id="fKeyword" class="form-control" placeholder="题干/关键词" /></div>
            </div>
            <button class="btn btn-info btn-sm" id="searchBtn"><i class="fas fa-search"></i> 查询</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h3 class="card-title">题目列表</h3></div>
          <div class="card-body table-responsive p-0">
            <table class="table table-hover text-nowrap mb-0">
              <thead>
                <tr>
                  <th>ID</th><th>岗位</th><th>类型</th><th>难度</th><th>题目内容</th><th>关键词</th><th>状态</th><th>创建时间</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="questionBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="modal fade" id="questionModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="qModalTitle">新增题目</h5>
        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
      </div>
      <div class="modal-body">
        <form id="questionForm">
          <input id="qId" type="hidden" />
          <div class="form-row">
            <div class="form-group col-md-4"><label>岗位</label><select id="qRole" class="form-control"></select></div>
            <div class="form-group col-md-4"><label>题目类型</label><select id="qType" class="form-control"><option>TECH</option><option>PROJECT</option><option>SCENARIO</option><option>BEHAVIOR</option></select></div>
            <div class="form-group col-md-4"><label>难度</label><select id="qDifficulty" class="form-control"><option>JUNIOR</option><option>MIDDLE</option><option>SENIOR</option></select></div>
          </div>
          <div class="form-group"><label>题目内容</label><textarea id="qText" class="form-control" rows="3"></textarea></div>
          <div class="form-group"><label>关键词（逗号分隔）</label><input id="qKeywords" class="form-control" /></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" id="saveQuestionBtn">保存</button>
      </div>
    </div>
  </div>
</div>

<script src="./vendor/jquery/jquery.min.js"></script>
<script src="./vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="./vendor/adminlte/adminlte.min.js"></script>
<script src="./assets/js/admin-api.js"></script>
<script src="./assets/js/admin-common.js"></script>
<script src="./assets/js/questions.js"></script>
</body>
</html>
