<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Interview Admin | 知识库管理</title>
  <link rel="stylesheet" href="./vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="./vendor/adminlte/adminlte.min.css" />
  <link rel="stylesheet" href="./assets/css/admin-custom.css" />
</head>
<body class="hold-transition sidebar-mini layout-fixed layout-navbar-fixed text-sm">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li></ul>
    <ul class="navbar-nav ml-auto"><li class="nav-item"><a href="./index.html" class="nav-link text-muted">返回仪表盘</a></li></ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="./index.html" class="brand-link"><span class="brand-text font-weight-light ml-2">AI Interview Admin</span></a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          <li class="nav-item"><a href="./index.html" data-menu="index.html" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>仪表盘</p></a></li>
          <li class="nav-item"><a href="./roles.html" data-menu="roles.html" class="nav-link"><i class="nav-icon fas fa-balance-scale"></i><p>岗位与权重</p></a></li>
          <li class="nav-item"><a href="./questions.html" data-menu="questions.html" class="nav-link"><i class="nav-icon fas fa-list"></i><p>题库管理</p></a></li>
          <li class="nav-item"><a href="./knowledge.html" data-menu="knowledge.html" class="nav-link"><i class="nav-icon fas fa-book"></i><p>知识库管理</p></a></li>
          <li class="nav-item"><a href="./reports.html" data-menu="reports.html" class="nav-link"><i class="nav-icon fas fa-file-alt"></i><p>会话与报告</p></a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-7"><h1>知识库管理（RAG）</h1></div>
          <div class="col-sm-5 text-right"><button class="btn btn-primary btn-sm" id="addDocBtn"><i class="fas fa-plus"></i> 新增文档</button></div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="card card-outline card-info">
          <div class="card-body">
            <div class="form-row">
              <div class="form-group col-md-3"><label>岗位</label><select id="fRole" class="form-control"></select></div>
              <div class="form-group col-md-2"><label>状态</label><select id="fStatus" class="form-control"><option value="">全部</option><option>ACTIVE</option><option>DISABLED</option></select></div>
              <div class="form-group col-md-2"><label>文档类型</label><select id="fDocType" class="form-control"><option value="">全部</option><option>MARKDOWN</option><option>PDF</option><option>TXT</option></select></div>
              <div class="form-group col-md-5"><label>关键词</label><input id="fKeyword" class="form-control" placeholder="标题/来源/摘要" /></div>
            </div>
            <button class="btn btn-info btn-sm" id="searchBtn"><i class="fas fa-search"></i> 查询</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h3 class="card-title">文档列表</h3></div>
          <div class="card-body table-responsive p-0">
            <table class="table table-hover text-nowrap mb-0">
              <thead>
                <tr>
                  <th>ID</th><th>岗位</th><th>标题</th><th>类型</th><th>状态</th><th>版本</th><th>更新时间</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="docBody"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h3 class="card-title">检索日志（最近 100 条）</h3></div>
          <div class="card-body table-responsive p-0">
            <table class="table table-hover text-nowrap mb-0">
              <thead><tr><th>ID</th><th>会话ID</th><th>岗位</th><th>Query</th><th>TopK</th><th>耗时(ms)</th><th>创建时间</th></tr></thead>
              <tbody id="logBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="modal fade" id="docModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="docModalTitle">新增知识文档</h5>
        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
      </div>
      <div class="modal-body">
        <form id="docForm">
          <input type="hidden" id="dId" />
          <div class="form-row">
            <div class="form-group col-md-4"><label>岗位</label><select id="dRole" class="form-control"></select></div>
            <div class="form-group col-md-4"><label>类型</label><select id="dType" class="form-control"><option>MARKDOWN</option><option>PDF</option><option>TXT</option></select></div>
            <div class="form-group col-md-4"><label>状态</label><select id="dStatus" class="form-control"><option>ACTIVE</option><option>DISABLED</option></select></div>
          </div>
          <div class="form-group"><label>标题</label><input id="dTitle" class="form-control" /></div>
          <div class="form-row">
            <div class="form-group col-md-6"><label>来源名称</label><input id="dSourceName" class="form-control" /></div>
            <div class="form-group col-md-6"><label>来源链接</label><input id="dSourceUrl" class="form-control" /></div>
          </div>
          <div class="form-group"><label>存储路径</label><input id="dStoragePath" class="form-control" /></div>
          <div class="form-group mb-0"><label>摘要</label><textarea id="dSummary" class="form-control" rows="3"></textarea></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" id="saveDocBtn">保存</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="chunkModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="chunkTitle">文档切片管理</h5>
        <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group col-md-9"><label>新增切片内容</label><textarea id="cText" class="form-control" rows="2"></textarea></div>
          <div class="form-group col-md-3"><label>关键词</label><input id="cKeywords" class="form-control" /></div>
        </div>
        <button class="btn btn-outline-primary btn-sm mb-2" id="addChunkBtn">+ 新增切片</button>
        <div class="table-responsive">
          <table class="table table-sm table-bordered">
            <thead><tr><th>#</th><th>切片内容</th><th>关键词</th><th>Token</th></tr></thead>
            <tbody id="chunkBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="./vendor/jquery/jquery.min.js"></script>
<script src="./vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="./vendor/adminlte/adminlte.min.js"></script>
<script src="./assets/js/admin-api.js"></script>
<script src="./assets/js/admin-common.js"></script>
<script src="./assets/js/knowledge.js"></script>
</body>
</html>
