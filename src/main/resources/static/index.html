<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 面试教练 - 登录注册</title>
  <link rel="stylesheet" href="./assets/css/auth-page.css" />
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>

  <main class="page">
    <section class="shell">
      <aside class="left">
        <span class="kicker">欢迎访问</span>
        <h1>先完成账号登录，再进入岗位化 AI 面试训练</h1>

        <div class="hero-image">
          <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=800&q=80" alt="AI Interview Coach" />
        </div>

      </aside>

      <section class="right">
        <header class="head">
          <h2>欢迎回来</h2>
          <p>使用用户名完成注册后，即可进行登录与面试训练。</p>
        </header>

        <div class="tabs">
          <button id="tabLogin" class="active" type="button">登录</button>
          <button id="tabRegister" type="button">注册</button>
        </div>

        <div class="form-box">
          <form id="loginForm" class="active">
            <div class="field">
              <label for="loginAccount">账号（用户名）</label>
              <input id="loginAccount" placeholder="请输入用户名" value="alice" />
            </div>
            <div class="field">
              <label for="loginPassword">密码</label>
              <input id="loginPassword" type="password" placeholder="请输入密码" value="12345678" />
            </div>
            <div class="meta">
              <label><input type="checkbox" id="rememberMe" checked /> 7天免登录</label>
              <a href="#" onclick="return false;">忘记密码</a>
            </div>
            <button class="action" type="submit">登录并进入系统</button>
            <p class="hint" id="loginHint"></p>
            <div class="toast" id="loginToast"></div>
          </form>

          <form id="registerForm">
            <div class="row">
              <div class="field">
                <label for="regUsername">用户名</label>
                <input id="regUsername" placeholder="例如：alice" value="alice" />
              </div>
              <div class="field">
                <label for="regPhone">手机号</label>
                <input id="regPhone" placeholder="11位手机号" value="13800001111" />
              </div>
            </div>
            <div class="field">
              <label for="regEmail">邮箱</label>
              <input id="regEmail" placeholder="name@example.com" value="alice@example.com" />
            </div>
            <div class="row">
              <div class="field">
                <label for="regPwd">密码</label>
                <input id="regPwd" type="password" placeholder="至少8位" value="12345678" />
              </div>
              <div class="field">
                <label for="regPwd2">确认密码</label>
                <input id="regPwd2" type="password" placeholder="再次输入密码" value="12345678" />
              </div>
            </div>
            <label class="agree">
              <input type="checkbox" id="regAgree" checked />
              <span>我已阅读并同意《用户协议》《隐私政策》，并授权平台保存本次训练数据用于能力评估。</span>
            </label>
            <button class="action" type="submit">创建账号</button>
            <p class="hint" id="regHint"></p>
            <div class="toast" id="registerToast"></div>
          </form>
        </div>

        <div class="foot-note">提示：登录成功后会写入 Token 到 localStorage，并跳转到业务页面。</div>
      </section>
    </section>
  </main>

  <script src="./assets/js/auth-page.js"></script>
</body>
</html>
